# MedHarness nginx DMZ entrypoint · T10
# T11 TLS terminator (443 + cert) 后续启用

upstream model_router {
    server model-router:8000 max_fails=3 fail_timeout=10s;
}

upstream audit_log {
    server audit-log:8001 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    # Health endpoint for docker healthcheck
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/route {
        proxy_pass http://model_router;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /api/audit {
        proxy_pass http://audit_log;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Other MCP services (phi-detector / desensitize / 4 stubs) run over MCP stdio.
    # They remain internal-only and are not proxied here.
}
