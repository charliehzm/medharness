name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      # ruff 钉版本：unpinned 会随上游升级反复重排历史文件、把每个 PR 的 lint 染红
      - run: pip install ruff==0.15.15 black mypy
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/integration -v

  dryrun:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: bash dryrun_e2e_v2.sh --ci
      - name: Upload AUDIT_BUNDLE
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-bundle-${{ github.run_id }}
          path: AUDIT_BUNDLE_*.tar.gz
          retention-days: 30
