fields:
  - id: cn_id
    presidio_entity: CN_ID
    score_min: 0.60
    must_pass_luhn: true
    context_boost: {keywords: [身份证, 证件号, 公民身份号码, ID], window: 20}
  - id: cn_phone
    presidio_entity: CN_PHONE
    score_min: 0.70
    pattern: "^(13|14|15|16|17|18|19)\\d{9}$"
    context_boost: {keywords: [手机, 电话, 联系, 手机号], window: 20}
  - id: cn_mrn
    presidio_entity: CN_MRN
    score_min: 0.70
    pattern: "^[A-Z]{2}\\d{8}$"
    context_boost: {keywords: [病案号, 住院号, MRN, 病历号], window: 24}
  - id: cn_bank
    presidio_entity: CN_BANK
    score_min: 0.80
    must_pass_luhn: true
    context_boost: {keywords: [银行卡, 卡号, 账号, 银联, 信用卡], window: 20}
  - id: cn_name
    presidio_entity: CN_NAME
    score_min: 0.65
    context_boost: {keywords: [患者, 病人, 姓名, 医生, 护士], window: 20}
  - id: cn_address
    presidio_entity: CN_ADDRESS
    score_min: 0.70
    context_boost: {keywords: [住址, 地址, 籍贯, 现住, 家庭住址], window: 30}
  - id: cn_passport
    presidio_entity: CN_PASSPORT
    score_min: 0.72
    pattern: "^E\\d{8}$"
    context_boost: {keywords: [护照, passport], window: 20}
  - id: cn_hk_id
    presidio_entity: CN_HK_ID
    score_min: 0.72
    context_boost: {keywords: [香港身份证, HKID], window: 20}
  - id: cn_drivers_license
    presidio_entity: CN_DRIVERS_LICENSE
    score_min: 0.72
    context_boost: {keywords: [驾驶证, 驾照], window: 20}
  - id: cn_disease_code
    presidio_entity: CN_DISEASE_CODE
    score_min: 0.68
    context_boost: {keywords: [诊断, 疾病, ICD, 病种, 出院诊断, 入院诊断], window: 24}
  - id: cn_drug_code
    presidio_entity: CN_DRUG_CODE
    score_min: 0.70
    context_boost: {keywords: [药品, 处方, 国药准字, 用药, 医嘱], window: 24}
  - id: email
    presidio_entity: EMAIL_ADDRESS
    score_min: 0.65
    context_boost: {keywords: [邮箱, email, 联系方式], window: 20}
  - id: ip_address
    presidio_entity: IP_ADDRESS
    score_min: 0.65
    context_boost: {keywords: [IP, ip, 登录, 访问], window: 16}
  - id: url
    presidio_entity: URL
